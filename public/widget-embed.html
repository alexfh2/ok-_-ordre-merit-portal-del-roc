<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rànquing Vallromanes 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: transparent;
      font-family: 'Outfit', sans-serif;
      height: auto;
      overflow: hidden;
    }
    body { padding: 8px; }
    .embed-widget {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: linear-gradient(135deg, #2a4a30, #2e441d);
      border-radius: 14px;
      max-width: 480px;
      width: 100%;
      text-decoration: none;
      color: #fff;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .embed-widget:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }
    .embed-widget img {
      width: 56px;
      height: 56px;
      flex-shrink: 0;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
    }
    .embed-widget .info { flex: 1; min-width: 0; }
    .embed-widget .info .tag {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #a8c191;
      margin-bottom: 3px;
    }
    .embed-widget .info h2 {
      font-size: 0.95rem;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 2px;
    }
    .embed-widget .info h2 span { color: #82a566; }
    .embed-widget .info p {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.55);
      font-weight: 400;
    }
    .embed-widget .arrow {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      background: rgba(130,165,102,0.25);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .embed-widget .arrow svg { width: 14px; height: 14px; color: #a8c191; }
  </style>
</head>
<body>
  <a href="https://green-fairway-rankings.lovable.app" target="_blank" rel="noopener" class="embed-widget">
    <img src="https://green-fairway-rankings.lovable.app/images/logo-full.png" alt="P&P Vallromanes" />
    <div class="info">
      <div class="tag">Circuit 2026</div>
      <h2>Rànquing <span>P&amp;P Vallromanes</span></h2>
      <p>Veure classificacions oficials →</p>
    </div>
    <div class="arrow">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" /></svg>
    </div>
  </a>
</body>
</html>
