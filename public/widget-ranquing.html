<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rànquing Vallromanes 2026 - Widget</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #2a4a30 0%, #2e441d 40%, #3a5523 100%);
      font-family: 'Outfit', sans-serif;
    }

    .widget {
      text-align: center;
      padding: 48px 40px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      max-width: 420px;
      width: 90%;
    }

    .widget img {
      width: 160px;
      height: 160px;
      margin: 0 auto 24px;
      display: block;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,0.4));
    }

    .widget h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    .widget h1 span {
      color: #82a566;
    }

    .widget p {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.6);
      margin-bottom: 32px;
      font-weight: 400;
    }

    .widget .cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      background: linear-gradient(135deg, #598234, #82a566);
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(89,130,52,0.4);
    }

    .widget .cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(89,130,52,0.5);
    }

    .widget .cta svg {
      width: 18px;
      height: 18px;
    }

    .badge {
      display: inline-block;
      margin-bottom: 20px;
      padding: 4px 14px;
      background: rgba(130,165,102,0.2);
      border: 1px solid rgba(130,165,102,0.3);
      border-radius: 100px;
      color: #a8c191;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="widget">
    <img src="https://green-fairway-rankings.lovable.app/images/logo-full.png" alt="Rànquing Vallromanes 2026" />
    <div class="badge">Circuit 2026 · 10 Proves</div>
    <h1>Rànquing <span>P&amp;P Vallromanes</span></h1>
    <p>Classificacions oficials del circuit de Pitch &amp; Putt 2026</p>
    <a href="https://green-fairway-rankings.lovable.app" target="_blank" rel="noopener" class="cta">
      Veure Classificacions
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" /></svg>
    </a>
  </div>

</body>
</html>
